name: Automated biome migrate

# Auto-triggers disabled: this workflow needs a PAT (`GH_TOKEN` secret) +
# the `automated` environment to open follow-up PRs. Re-enable the push/
# schedule/issue_comment triggers below once those are configured. Until
# then the workflow can still be invoked manually via `workflow_dispatch`.
on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  biome-migrate:
    name: biome migrate

    runs-on: ubuntu-24.04-arm
    environment: automated
    timeout-minutes: 10

    if: github.event_name != 'issue_comment' || (startsWith(github.event.issue.title, 'Automated biome migrate') && contains(github.event.comment.body, '/rerun'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Setup pnpm
        run: corepack enable

      - name: Get pnpm cache directory
        shell: bash
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> ${GITHUB_ENV}

      - name: Use pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.pnpm_cache_dir }}
          key: ubuntu-24.04-arm-node-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ubuntu-24.04-arm-node-

      - name: Install pnpm dependencies
        id: install-pnpm
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile
        continue-on-error: true

      - name: Install pnpm dependencies (retry)
        if: steps.install-pnpm.outcome == 'failure'
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile

      - name: Run biome migrate
        run: |
          set -o pipefail
          pnpm biome:migrate | tee .github/pr_body.log

      - name: Check for changes
        run: |
          if git diff --exit-code; then
            echo "changes=false" >> $GITHUB_ENV
          else
            echo "changes=true" >> $GITHUB_ENV
          fi

      - name: Commit and push to branch
        if: env.changes == 'true'
        uses: EndBug/add-and-commit@v10
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          default_author: github_actions
          message: Automated biome migrate [skip ci]
          new_branch: automated/biome-migrate
          fetch: false
          push: origin automated/biome-migrate --set-upstream --force

      - name: Create pull request
        if: env.changes == 'true'
        run: |-
          if [[ $(gh pr view automated/biome-migrate --json state --jq .state || true) != "OPEN" ]]; then
            gh pr create \
              --head automated/biome-migrate \
              --title "Automated biome migrate [skip ci]" \
              --body-file .github/pr_body.log \
              --label automated \
              --label trunk
          else
            gh pr edit automated/biome-migrate \
              --title "Automated biome migrate [skip ci]" \
              --body-file .github/pr_body.log
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Close pull request
        if: env.changes == 'false'
        run: gh pr list --head automated/biome-migrate --json number --jq '.[].number' | xargs -rn1 gh pr close --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
